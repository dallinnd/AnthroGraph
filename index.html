<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anthropac Analyzer PWA</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    
    <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css">
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>

    <py-config>
        packages = ["pandas", "scikit-learn", "scipy"]
    </py-config>
</head>
<body>
    <div class="dashboard">
        <header>
            <h1>Anthropac Data Analyzer</h1>
            <p>Upload your .csv data to generate spatial maps and partitions.</p>
        </header>

        <div class="card tabs-card">
            <div class="tabs">
                <button class="tab-btn active" onclick="selectTab('freelist')">Free List</button>
                <button class="tab-btn" onclick="selectTab('freelist-filter')">Filtered Free List</button>
                <button class="tab-btn" onclick="selectTab('partitions')">Partitions</button>
                <button class="tab-btn" onclick="selectTab('pilesort')">Pile Sort</button>
            </div>

            <div class="controls-section">
                <input type="hidden" id="current-mode" value="freelist">
                
                <input type="file" id="csv-upload" accept=".csv">
                
                <div id="k-value-container" style="display: none; margin-top: 15px;">
                    <label style="font-weight:bold; color:#555;">Number of Clusters (k): </label>
                    <input type="number" id="k-value" value="3" min="1" max="10" style="width: 60px; padding:5px;">
                </div>

                <button id="run-btn" py-click="process_data" style="margin-top: 20px;">Generate Plot</button>
            </div>
        </div>

        <div class="card plot-card">
            <div id="plot-container">
                <p class="placeholder-text">Awaiting data...</p>
            </div>
        </div>
    </div>

    <script>
        function selectTab(mode) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('current-mode').value = mode;
            
            // Show k-value input only when clustering is needed
            if(mode === 'partitions' || mode === 'pilesort') {
                document.getElementById('k-value-container').style.display = 'block';
            } else {
                document.getElementById('k-value-container').style.display = 'none';
            }
        }
    </script>
    
    <script src="app.js"></script>
    <script type="py" src="calc.py"></script>
</body>
</html>
